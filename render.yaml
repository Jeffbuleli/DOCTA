# Blueprint de deploiement Render pour Docta
# Cree : 1 base Postgres + 1 service API (NestJS) + 1 site statique (React PWA)
# Doc : https://render.com/docs/blueprint-spec

databases:
  - name: docta-db
    databaseName: docta
    plan: free
    postgresMajorVersion: "16"

services:
  # --- API NestJS ---
  - type: web
    name: docta-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: docta-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "10000"

  # --- Frontend React PWA (site statique) ---
  - type: web
    name: docta-web
    runtime: static
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "22"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
